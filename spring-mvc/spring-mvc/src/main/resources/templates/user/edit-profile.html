<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chỉnh sửa thông tin cá nhân</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8fafc; min-height: 100vh; }
    .navbar-custom { background-color: #0f172a; }
    .profile-card { border-radius: 0.75rem; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03); }
  </style>
</head>
<body>

<!-- HEADER NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/users}">RAM MVC SYSTEM</a>
    <a th:href="@{/users}" class="btn btn-outline-light btn-sm fw-semibold">⬅️ Quay lại danh sách</a>
  </div>
</nav>

<div class="container" style="max-width: 600px;">
  <div class="card profile-card border-0 bg-white">
    <div class="card-header bg-dark text-white py-3 border-0" style="border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem;">
      <h5 class="mb-0 fw-bold">📝 CẬP NHẬT HỒ SƠ CÁ NHÂN</h5>
    </div>
    <div class="card-body p-4">

      <!-- Hiện lỗi hệ thống phát sinh nếu có -->
      <div th:if="${globalError}" class="alert alert-danger" th:text="${globalError}"></div>

      <form th:action="@{/users/my-profile/edit}" th:object="${profileDto}" method="post">

        <!-- KHỐI 1: TÀI KHOẢN ĐỊNH DANH (READ-ONLY) -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Tên tài khoản (Cố định)</label>
            <input type="text" class="form-control bg-light text-secondary" th:value="${userData.username}" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label text-muted small fw-bold">Địa chỉ Email (Cố định)</label>
            <input type="text" class="form-control bg-light text-secondary" th:value="${userData.email}" readonly>
          </div>
        </div>

        <!-- KHỐI 2: ĐỔI MẬT KHẨU MỚI (CÓ VALIDATE BÁO ĐỎ TỪ SERVICE) -->
        <div class="mb-4">
          <label class="form-label text-dark small fw-bold">Đổi mật khẩu mới</label>
          <input type="password" th:field="*{password}"
                 class="form-control"
                 th:classappend="${errors != null and errors.containsKey('password')} ? 'is-invalid' : ''"
                 placeholder="Bỏ trống nếu không muốn thay đổi mật khẩu">
          <!-- Hiện chữ đỏ báo lỗi nếu chuỗi < 6 ký tự -->
          <div class="invalid-feedback" th:if="${errors != null and errors.containsKey('password')}"
               th:text="${errors.get('password')}"></div>
          <div class="form-text text-muted" style="font-size: 11px;">Nếu muốn giữ lại mật khẩu cũ, hãy để trống ô này.</div>
        </div>

        <!-- KHỐI 3: THÔNG TIN HỒ SƠ MỞ RỘNG -->
        <div class="d-flex align-items-center mb-3">
          <h6 class="text-secondary fw-bold mb-0 small text-uppercase">Thông tin liên hệ</h6>
          <div class="flex-grow-1 border-bottom ms-2" style="border-color: #e2e8f0 !important;"></div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-7">
            <label class="form-label text-secondary small fw-semibold">Họ và Tên</label>
            <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nhập họ tên...">
          </div>
          <div class="col-md-5">
            <label class="form-label text-secondary small fw-semibold">Ngày sinh</label>
            <input type="date" th:field="*{birthDate}" class="form-control">
          </div>
        </div>

        <div class="mb-4">
          <div class="row g-3">
            <div class="col-md-5">
              <label class="form-label text-secondary small fw-semibold">Số điện thoại</label>
              <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="09xxxxxxxx">
            </div>
            <div class="col-md-7">
              <label class="form-label text-secondary small fw-semibold">Địa chỉ thường trú</label>
              <input type="text" th:field="*{address}" class="form-control" placeholder="Số nhà, Tên đường...">
            </div>
          </div>
        </div>

        <!-- NÚT THỰC THI -->
        <div class="d-flex gap-2 border-top pt-3" style="border-color: #f1f5f9 !important;">
          <a th:href="@{/users}" class="btn btn-light fw-bold px-4">Hủy bỏ</a>
          <button type="submit" class="btn btn-dark fw-bold flex-grow-1">LƯU CẬP NHẬT XUỐNG RAM</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
