<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập hệ thống</title>
  <!-- Nhúng Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      height: 100vh;
    }
    .login-card {
      border-radius: 1rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="d-flex align-items-center">
<div class="container" style="max-width: 420px;">
  <div class="card login-card border-0 bg-white">
    <div class="card-header bg-white text-center pt-4 border-0">
      <div class="d-inline-block bg-dark text-white rounded-circle p-3 mb-3 shadow-sm">
        <span class="fs-4 fw-bold">🔒</span>
      </div>
      <h4 class="mb-0 fw-bold text-dark">HỆ THỐNG ĐĂNG NHẬP</h4>
      <p class="text-muted small mb-0 mt-1">Xác thực phiên làm việc để truy cập vào RAM</p>
    </div>
    <div class="card-body p-4">

      <!-- 🟥 HIỂN THỊ CÂU LỖI STRING TỪ SERVICE (Ăn khớp với e.getMessage()) -->
      <!-- Chỉ cần kiểm tra nếu biến errors tồn tại và không trống thì in thẳng chuỗi đó ra -->
      <div th:if="${errors != null and errors != ''}"
           class="alert alert-danger text-center shadow-sm p-2 small"
           th:text="${errors}">
      </div>

      <!-- 🟩 Hiện thông báo màu xanh nếu vừa từ trang Register nhảy qua thành công -->
      <div th:if="${successMessage}"
           class="alert alert-success text-center shadow-sm p-2 small"
           th:text="${successMessage}">
      </div>

      <form th:action="@{/login}" th:object="${loginDto}" method="post" class="mt-3">

        <!-- Ô NHẬP USERNAME -->
        <div class="mb-3">
          <label class="form-label text-secondary small fw-semibold">Tên đăng nhập</label>
          <!-- Khi dùng chuỗi lỗi đơn lẻ, ta sẽ bọc đỏ ô input nếu nội dung lỗi liên quan đến tài khoản hoặc trống trường -->
          <input type="text" th:field="*{username}"
                 class="form-control"
                 th:classappend="${errors != null and (errors.contains('Tên đăng nhập') or errors.contains('để trống'))} ? 'is-invalid' : ''"
                 placeholder="Nhập tên tài khoản..." autocomplete="off">
        </div>

        <!-- Ô NHẬP PASSWORD -->
        <div class="mb-4">
          <label class="form-label text-secondary small fw-semibold">Mật khẩu</label>
          <input type="password" th:field="*{password}"
                 class="form-control"
                 th:classappend="${errors != null and (errors.contains('Mật khẩu') or errors.contains('để trống'))} ? 'is-invalid' : ''"
                 placeholder="Nhập mật khẩu...">
        </div>

        <!-- NÚT ĐĂNG NHẬP -->
        <button type="submit" class="btn btn-dark w-100 fw-bold py-2 shadow-sm text-uppercase">
          Đăng nhập vào RAM
        </button>

        <!-- LINK ĐIỀU HƯỚNG QUAY TRỞ LẠI REGISTER -->
        <div class="text-center mt-4 border-top pt-3" style="border-color: #f1f5f9 !important;">
          <span class="text-muted small">Bạn chưa có tài khoản?</span>
          <a th:href="@{/register}" class="text-dark fw-bold small text-decoration-none ms-1">Đăng ký ngay</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
