<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản hệ thống</title>
    <!-- Nhúng Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            min-height: 100vh;
        }
        .register-card {
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">
<div class="container" style="max-width: 650px;">
    <div class="card register-card border-0 bg-white">
        <div class="card-header bg-dark text-white text-center py-4 border-0" style="border-top-left-radius: 1rem; border-top-right-radius: 1rem;">
            <h4 class="mb-0 fw-bold tracking-wide">ĐĂNG KÝ THÀNH VIÊN</h4>
            <p class="text-white-50 small mb-0 mt-1">Khởi tạo tài khoản định danh trên hệ thống RAM</p>
        </div>
        <div class="card-body p-4 p-md-5">

            <!-- Thông báo lỗi hệ thống chung (nếu có) -->
            <div th:if="${globalError}" class="alert alert-danger text-center shadow-sm" th:text="${globalError}"></div>

            <form th:action="@{/register}" th:object="${registerDto}" method="post">

                <!-- PHẦN 1: THÔNG TIN TÀI KHOẢN -->
                <div class="d-flex align-items-center mb-3">
                    <h6 class="text-dark fw-bold mb-0 text-uppercase small">1. Tài khoản đăng nhập</h6>
                    <div class="flex-grow-1 border-bottom ms-3" style="border-color: #e2e8f0 !important;"></div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-secondary small fw-semibold">Tên tài khoản (Username)</label>
                        <input type="text" th:field="*{username}"
                               class="form-control"
                               th:classappend="${errors != null and errors.containsKey('username')} ? 'is-invalid' : ''"
                               placeholder="Tối thiểu 8 ký tự">
                        <div class="invalid-feedback" th:if="${errors != null and errors.containsKey('username')}"
                             th:text="${errors.get('username')}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-secondary small fw-semibold">Mật khẩu bảo mật</label>
                        <input type="password" th:field="*{password}"
                               class="form-control"
                               th:classappend="${errors != null and errors.containsKey('password')} ? 'is-invalid' : ''"
                               placeholder="Tối thiểu 6 ký tự">
                        <div class="invalid-feedback" th:if="${errors != null and errors.containsKey('password')}"
                             th:text="${errors.get('password')}"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary small fw-semibold">Địa chỉ Email</label>
                    <input type="text" th:field="*{email}"
                           class="form-control"
                           th:classappend="${errors != null and errors.containsKey('email')} ? 'is-invalid' : ''"
                           placeholder="vinhnguyen@example.com">
                    <div class="invalid-feedback" th:if="${errors != null and errors.containsKey('email')}"
                         th:text="${errors.get('email')}"></div>
                </div>

                <!-- PHẦN 2: THÔNG TIN CÁ NHÂN -->
                <div class="d-flex align-items-center mb-3">
                    <h6 class="text-dark fw-bold mb-0 text-uppercase small">2. Hồ sơ cá nhân mở rộng</h6>
                    <div class="flex-grow-1 border-bottom ms-3" style="border-color: #e2e8f0 !important;"></div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-7">
                        <label class="form-label text-secondary small fw-semibold">Họ và Tên</label>
                        <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A">
                    </div>
                    <div class="col-md-5">
                        <label class="form-label text-secondary small fw-semibold">Ngày sinh</label>
                        <input type="date" th:field="*{birthDate}" class="form-control">
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-5">
                        <label class="form-label text-secondary small fw-semibold">Số điện thoại</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="09xxxxxxxx">
                    </div>
                    <div class="col-md-7">
                        <label class="form-label text-secondary small fw-semibold">Địa chỉ liên hệ</label>
                        <input type="text" th:field="*{address}" class="form-control" placeholder="Tỉnh/Thành phố hiện tại">
                    </div>
                </div>

                <!-- NÚT ĐĂNG KÝ -->
                <button type="submit" class="btn btn-dark w-100 fw-bold py-2.5 shadow-sm text-uppercase tracking-wider">
                    Xác nhận đăng ký lên hệ thống
                </button>

                <div class="text-center mt-4 border-top pt-3" style="border-color: #f1f5f9 !important;">
                    <span class="text-muted small">Bạn đã có tài khoản thành viên?</span>
                    <a th:href="@{/login}" class="text-dark fw-bold small text-decoration-none ms-1">Đăng nhập ngay</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
