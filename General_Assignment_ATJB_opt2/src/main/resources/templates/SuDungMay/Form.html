<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{Layout}">
<head>
    <title>Đăng ký sử dụng máy tính</title>
</head>
<body>

<div layout:fragment="content">
    <div class="mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/computers" class="text-decoration-none">Quản lý máy tính</a></li>
                <li class="breadcrumb-item active" aria-current="page">Đăng ký sử dụng</li>
            </ol>
        </nav>
        <h3 class="fw-bold text-dark">ĐĂNG KÝ SỬ DỤNG MÁY TÍNH</h3>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-3" role="alert">
        <i class="fa-solid fa-triangle-exclamation me-2"></i>
        <span th:text="${errorMsg}">Nội dung lỗi...</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-3" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i>
        <span th:text="${successMsg}">Thành công!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div id="jsErrorBlock" class="alert alert-warning alert-dismissible fade show border-0 shadow-sm mb-3 d-none" role="alert">
        <i class="fa-solid fa-circle-exclamation me-2"></i>
        <span id="jsErrorMsg">Lỗi nhập liệu...</span>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form id="usageForm" th:action="@{/computer-usage/save}" th:object="${computerUsage}" method="post" onsubmit="return validateUsageFormJS()">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Khách hàng <span class="text-danger">*</span></label>
                        <select id="selectCustomer" th:field="*{khachHang.maKH}" class="form-select">
                            <option value="">-- Chọn khách hàng --</option>
                            <option th:each="c : ${customers}"
                                    th:value="${c.maKH}"
                                    th:text="|${c.maKH} - ${c.tenKH}|"></option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Máy tính <span class="text-danger">*</span></label>
                        <select id="selectComputer" th:field="*{may.maMay}" class="form-select">
                            <option value="">-- Chọn máy tính --</option>
                            <option th:each="m : ${computers}"
                                    th:value="${m.maMay}"
                                    th:text="|${m.maMay} - Vị trí: ${m.viTri}|"></option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Ngày bắt đầu <span class="text-danger">*</span></label>
                        <input type="date" id="inputDate" th:field="*{id.ngayBatDauSuDung}" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Giờ bắt đầu (HH:mm) <span class="text-danger">*</span></label>
                        <input type="text" id="inputTime" th:field="*{id.gioBatDauSuDung}" class="form-control" placeholder="Ví dụ: 08:30">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Thời gian sử dụng (Phút) <span class="text-danger">*</span></label>
                        <input type="number" id="inputDuration" th:field="*{thoiGianSuDung}" class="form-control" placeholder="Nhập số phút...">
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a href="/computers" class="btn btn-light px-4 border">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="fa-solid fa-save me-2"></i>Xác nhận đăng ký
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script layout:fragment="script">
    function validateUsageFormJS() {
        const maKH = document.getElementById("selectCustomer").value;
        const maMay = document.getElementById("selectComputer").value;
        const dateVal = document.getElementById("inputDate").value;
        const timeVal = document.getElementById("inputTime").value.trim();
        const duration = document.getElementById("inputDuration").value;

        const errorBlock = document.getElementById("jsErrorBlock");
        const errorMsg = document.getElementById("jsErrorMsg");

        function showJSAlert(text) {
            errorMsg.innerText = text;
            errorBlock.classList.remove("d-none");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 1. Kiểm tra chọn dữ liệu
        if (!maKH) {
            showJSAlert("Vui lòng chọn khách hàng sử dụng!");
            return false;
        }
        if (!maMay) {
            showJSAlert("Vui lòng chọn máy tính sử dụng!");
            return false;
        }

        const maKHRegex = /^KH\d{5}$/;
        const maMayRegex = /^MAY\d{3}$/;

        if (!maKHRegex.test(maKH)) {
            showJSAlert("Mã khách hàng đã chọn không đúng định dạng KHxxxxx!");
            return false;
        }
        if (!maMayRegex.test(maMay)) {
            showJSAlert("Mã máy tính đã chọn không đúng định dạng MAYxxx!");
            return false;
        }

        if (!dateVal) {
            showJSAlert("Vui lòng chọn ngày bắt đầu sử dụng!");
            return false;
        }

        const time24hRegex = /^([01]?[0-9]|2[0-3]):[0-5][0-9]$/;
        if (!timeVal || !time24hRegex.test(timeVal)) {
            showJSAlert("Giờ bắt đầu không đúng định dạng 24h (HH:mm)!");
            return false;
        }

        if (!duration || parseInt(duration) <= 0) {
            showJSAlert("Thời gian sử dụng phải là số nguyên dương lớn hơn 0!");
            return false;
        }

        errorBlock.classList.add("d-none");
        return true;
    }
</script>

</body>
</html>
