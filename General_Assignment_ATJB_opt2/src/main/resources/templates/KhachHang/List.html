<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{Layout}">
<head>
    <title>Danh sách khách hàng</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-dark mb-0">QUẢN LÝ KHÁCH HÀNG</h3>
            <small class="text-muted">Danh sách tất cả khách hàng trong hệ thống</small>
        </div>
        <a href="/customers/create" class="btn btn-primary px-4">
            <i class="fa-solid fa-plus me-2"></i>Thêm mới
        </a>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form action="/customers" method="get" class="row g-2">
                <div class="col-md-10">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i
                                class="fa-solid fa-search text-muted"></i></span>
                        <input type="text" name="keyword" class="form-control border-start-0"
                               placeholder="Tìm theo tên hoặc mã khách hàng...">
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-dark w-100">Tìm kiếm</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                <tr>
                    <th class="border-0 px-3">Mã KH</th>
                    <th class="border-0">Họ và Tên</th>
                    <th class="border-0">Số điện thoại</th>
                    <th class="border-0">Email</th>
                    <th class="border-0">Địa chỉ</th>
                    <th class="border-0 text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${customers}">
                    <td class="px-3 fw-bold text-primary" th:text="${c.maKH}">KH001</td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-2"
                                 style="width: 30px; height: 30px; font-size: 12px;"
                                 th:text="${#strings.substring(c.tenKH,0,1)}">N
                            </div>
                            <span th:text="${c.tenKH}">Nguyễn Văn A</span>
                        </div>
                    </td>
                    <td th:text="${c.soDienThoai}">0901234567</td>
                    <td th:text="${c.diaChiEmail}">nguyenvana@gmail.com</td>
                    <td th:text="${c.diaChi}"></td>
                    <td class="text-center">
                        <div class="btn-group shadow-sm rounded">
                            <a th:href="@{'/customers/edit/' + ${c.maKH}}" class="btn btn-white btn-sm border"><i
                                    class="fa-solid fa-edit text-warning"></i></a>
                            <a href="javascript:void(0)" onclick="deleteRow(this)" class="btn btn-white btn-sm border">
                            <i class="fa-solid fa-trash text-danger"></i></a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 d-flex justify-content-center">
        <nav>
            <ul class="pagination">
                <li class="page-item"><a class="page-link border-0 shadow-sm mx-1 rounded" href="#"><i
                        class="fa-solid fa-angle-left"></i></a></li>
                <li class="page-item active"><a class="page-link border-0 shadow-sm mx-1 rounded" href="#">1</a></li>
                <li class="page-item"><a class="page-link border-0 shadow-sm mx-1 rounded" href="#">2</a></li>
                <li class="page-item"><a class="page-link border-0 shadow-sm mx-1 rounded" href="#"><i
                        class="fa-solid fa-angle-right"></i></a></li>
            </ul>
        </nav>
    </div>
</div>
<script>
    function deleteRow(btn) {
        if (confirm('Bạn có chắc chắn muốn xóa khách hàng này không?')) {
            const row = btn.closest('tr');

            if (row) {
                row.remove();
            }
        }
    }
</script>

</body>
</html>
