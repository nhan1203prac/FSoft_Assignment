    <script>

        // mock user use to login
        const ADMIN_ACCOUNT = {
            email: "admin@gmail.com",
            password: "123456"
        };

        document.addEventListener('DOMContentLoaded', () => {
            //=========================== map data ==============================
            const pollsWrapper = document.getElementById('polls-wrapper');
            const polls = JSON.parse(localStorage.getItem('polls')) || [];

            if (polls.length === 0) {
                pollsWrapper.innerHTML = "<div class='alert alert-info'>Chưa có poll nào để hiển thị.</div>";
                return;
            }

            const pollsHtml = polls.map((poll, pollIndex) => {
                return `
            <div class="poll-item mb-5 p-4">
                <h2 class="font-weight-bold mb-4 border-bottom pb-2" style="color: #333;">
                    ${poll.name}
                </h2>
                
                <ol>
                    ${poll.questions.map((q, qIndex) => {
                    const isMandatory = q.mandatory ? '<span class="required text-danger">*</span>' : '';
                    const inputType = q.multiple ? 'checkbox' : 'radio';
                    const groupName = `poll${pollIndex}_q${qIndex}`;

                    return `
                            <li class="mb-4">
                                <p class="h5 font-weight-normal">${q.question} ${isMandatory}</p>
                                <div class="opt-res mt-2 ml-3">
                                    ${q.answers.map((ans, ansIndex) => {
                        const uniqueId = `poll${pollIndex}_q${qIndex}_opt${ansIndex}`;
                        return `
                                            <div class="custom-control custom-${inputType} mb-2">
                                                <input type="${inputType}" 
                                                       id="${uniqueId}" 
                                                       name="${groupName}" 
                                                       class="custom-control-input">
                                                <label class="custom-control-label" for="${uniqueId}" style="cursor: pointer;">
                                                    ${ans}
                                                </label>
                                            </div>
                                        `;
                    }).join('')}
                                </div>
                            </li>
                        `;
                }).join('')}
                </ol>
            </div>
        `;
            }).join('');

            pollsWrapper.innerHTML = pollsHtml;

            // ============================ setup login ========================================
            const loginForm = document.getElementById('loginForm');
            const authBtn = document.getElementById('auth-btn');

            function updateAuthUI() {
                const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
                const userEmail = localStorage.getItem('userEmail');

                if (isLoggedIn) {
                    authBtn.innerText = `Logout (${userEmail})`;
                    authBtn.setAttribute('data-toggle', ''); 
                } else {
                    authBtn.innerText = "Login";
                    authBtn.classList.replace('btn-danger', 'btn-login');
                    authBtn.setAttribute('data-toggle', 'modal'); 
                }
            }

            updateAuthUI();

            // click login buttton to login
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const emailInput = document.getElementById('loginEmail').value.trim();
                const passInput = document.getElementById('loginPassword').value.trim();

                if (emailInput === ADMIN_ACCOUNT.email && passInput === ADMIN_ACCOUNT.password) {
                    alert("Login successful!");

                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', emailInput);

                    $('#loginModal').modal('hide');

                    updateAuthUI();
                } else {
                    alert("Wrong email or password!");
                }
            });

            // click logout
            authBtn.addEventListener('click', () => {
                if (localStorage.getItem('isLoggedIn') === 'true') {
                    if (confirm("Do you want to logout?")) {
                        localStorage.removeItem('isLoggedIn');
                        localStorage.removeItem('userEmail');
                        location.reload(); 
                    }
                }
            });

            //================= btn retain event =======================

            const btn_retain = document.querySelector(".btn-retain");
            btn_retain.addEventListener('click', (e)=>{
                e.preventDefault();

                const isLoggedIn = localStorage.getItem("isLoggedIn");

                if(isLoggedIn !== "true"){
                    alert("Please login before vote!");
                    return;
                }

                const pollItems = document.querySelectorAll(".poll-item");
                const voteData = {
                    voter : localStorage.getItem('userEmail'),
                    votedAt: new Date().toISOString(),
                    details: []
                };
                let hasSelectionError = false;
                // get result from label element after input element by using nextElementSibling of input
                pollItems.forEach((pollElement, index)=>{
                    const selectedOptionns  =Array.from(pollElement.querySelectorAll('input:checked'))
                            .map(input => input.nextElementSibling.innerHTML.trim());
                    
                    const isMandatory = pollElement.querySelector('.required')!==null;
                    if(isMandatory && selectedOptionns.length === 0){
                        alert(`Please sign all question!!`)
                        hasSelectionError = true;
                    }
                    voteData.details.push({
                        pollName: pollElement.querySelector('h2').innerText,
                        selected: selectedOptionns
                    })
                    
                });
                if(hasSelectionError) return;

                const existingVotes = JSON.parse(localStorage.getItem('userVotes')) || [];
                existingVotes.push(voteData);
                localStorage.setItem('uservotes', JSON.stringify(existingVotes));
                alert("Thanks for voting!");
                console.log("data vote user ",voteData)
            })
        });
    </script>
