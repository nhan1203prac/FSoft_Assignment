<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <title>Login</title>
</head>

<body>
    <div class="container mt-5 d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="card" style="width: 400px">
            <div class="card-header">
                <span class="text-left w-100">Please Sign In</span>
            </div>
            <div class="card-body p-4">
                <form id="loginForm" onsubmit="return handleLogin(event)" action="">
                    <div class="form-group">
                        <input id="emailInput" type="email" class="form-control" maxlength="50" placeholder="E-mail">
                        <div class="invalid-feedback" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <input id="passwordInput" type="password" class="form-control" maxlength="50"
                            placeholder="Password">
                        <div class="invalid-feedback" id="passwordError"></div>
                    </div>

                    <div class="form-group form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>

                    <button type="submit" class="mb-2 btn btn-success btn-block">Login</button>
                    <a href="Register.html" class="text-decoration-none">Click here to register</a>
                    <p id="mainError" class="text-danger text-center mt-2" style="font-size: 0.9rem;"></p>
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

    <script>
        

        const handleLogin = (e) => {
            e.preventDefault();

            const emailVal = document.getElementById('emailInput').value.trim();
            const passwordVal = document.getElementById('passwordInput').value.trim();
            const mainError = document.getElementById("mainError");

            const isValid = validateForm();
            if (!isValid) return false;
            const users = JSON.parse(localStorage.getItem('users')) || []
            const userIndex = users.findIndex(u => u.email === emailVal && u.password == passwordVal)

            if (userIndex !== -1) {
                mainError.textContent = "";
                alert("Login successful!");
                window.location.href = "index.html"
            } else {

                mainError.textContent = "Email or password invalid";
                document.getElementById('emailInput').classList.add('is-invalid');
                document.getElementById('passwordInput').classList.add('is-invalid');
            }
            return false;


        }
        function validateForm() {
            const email = document.getElementById('emailInput');
            const password = document.getElementById('passwordInput');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            let isValid = true;

            email.classList.remove('is-invalid');
            password.classList.remove('is-invalid');
            emailError.textContent = '';
            passwordError.textContent = '';

            if (email.value.trim() === "") {
                emailError.textContent = 'Email is required';
                email.classList.add('is-invalid');
                isValid = false;
            }

            if (password.value.trim() === "") {
                passwordError.textContent = 'Password is required';
                password.classList.add('is-invalid');
                isValid = false;
            } 

            if (!isValid) {
                if (email.classList.contains('is-invalid')) {
                    email.focus();
                } else {
                    password.focus();
                }
            }

            return isValid;
        }
    </script>
</body>

</html>
