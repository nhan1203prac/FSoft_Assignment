<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="jumbotron">
            <h1 class="display-4">Welcome to CMS Dashboard!</h1>
            <p class="lead">You have successfully logged in.</p>
            <hr class="my-4">
            <p>Your login details:</p>
            <ul id="loginDetails" class="list-group list-group-flush">
                <li class="list-group-item"><strong>Email:</strong> <span id="userEmail">Loading...</span></li>
                <li class="list-group-item"><strong>Password:</strong> <span id="userPassword">Loading...</span></li>
                <li class="list-group-item"><strong>Login Time:</strong> <span id="loginTime"></span></li>
            </ul>
            <button class="btn btn-danger mt-3" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        // Sample valid credentials - stored in localStorage from login
        document.addEventListener('DOMContentLoaded', function() {
            const email = localStorage.getItem('loginEmail') || 'admin@example.com';
            const password = localStorage.getItem('loginPassword') || 'password123';
            
            document.getElementById('userEmail').textContent = email;
            document.getElementById('userPassword').textContent = password;
            document.getElementById('loginTime').textContent = new Date().toLocaleString();

            // Check if logged in
            if (!email || !password) {
                alert('Please login first!');
                window.location.href = 'Login.html';
                return;
            }
        });

        function logout() {
            localStorage.removeItem('loginEmail');
            localStorage.removeItem('loginPassword');
            window.location.href = 'Login.html';
        }
    </script>
</body>
</html>
