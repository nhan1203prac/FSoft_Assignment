<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Edit Profile</title>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom shadow-sm">
        <a class="navbar-brand" href="#">CMS</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active">
                    <a class="nav-link dropdown-toggle text-primary" href="#" data-toggle="dropdown"
                        aria-expanded="false">
                        <i class="fa fa-user"></i>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right">
                        <a class="dropdown-item border-bottom" href="#"><i class="fa fa-user mr-2"></i>User Profile</a>
                        <a onclick="handleLogout(event)" class="dropdown-item" href="#"><i class="fa fa-sign-out mr-2"></i>Logout</a>

                    </div>
                </li>



            </ul>
        </div>
    </nav>
    <div class="row no-gutters">
        <div class="col-3 border-right pr-0" style="min-height: 100vh; background-color: #f8f9fa;">
            <div class="input-group mb-3 p-3 border-bottom">
                <input type="text" class="form-control" placeholder="Search">
                <div class="input-group-append">
                    <span class="input-group-text bg-light"><i class="fa fa-search"></i></span>
                </div>
            </div>
            <div class="list-group list-group-flush">
                <a href="./ViewContent.html"
                    class="list-group-item list-group-item-action  text-primary border-bottom  ">
                    <i class="fa fa-th-list mr-2"></i> View contents
                </a>
                <a href="./FormContent.html" class="list-group-item list-group-item-action  text-primary">
                    <i class="fa fa-edit mr-2"></i> Form content
                </a>
            </div>
        </div>

        <div class="flex-grow-1 p-4 mt-3">
            <h3>Edit Profile</h3>
            <div class="card shadow-sm">
                <div class="card-header ">Profile Form Elements</div>
                <div class="card-body">
                    <form id="profileForm" style="max-width: 80%;" onsubmit="return handleSubmit(event)">

                        <div class=" form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" class="form-control" id="firstName" placeholder="First Name">
                            <div class="invalid-feedback" id="firstNameError"></div>
                        </div>
                        <div class=" form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" class="form-control" id="lastName" placeholder="Last Name">
                            <div class="invalid-feedback" id="lastNameError"></div>
                        </div>


                        <div class="form-group">
                            <label for="email">Email</label>
                            <br>
                            <span id="email"></span>

                        </div>

                        <div class="form-group">
                            <label for="phoneInput">Phone</label>
                            <input type="text" class="form-control" id="phoneInput" placeholder="Phone Number">
                            <div class="invalid-feedback" id="phoneError"></div>
                        </div>

                        <div class="form-group">
                            <label for="descriptionInput">Description</label>
                            <textarea class="form-control" id="descriptionInput" rows="4" maxlength="200"></textarea>
                        </div>

                        <div class="button-group mt-3">
                            <button type="submit" class="btn btn-success">Submit Button</button>
                            <button type="reset" class="btn btn-success" id="resetBtn">Reset Button</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

    <script>
        $(document).ready(function () {
            function loadProfile() {
                const user = JSON.parse(localStorage.getItem('userProfile'))

                $('#firstName').val(user.firstName);
                $('#lastName').val(user.lastName);
                $('#email').text(user.email);
                $('#phoneInput').val(user.phone);
                $('#descriptionInput').val(user.description);

                if (!localStorage.getItem('userProfile')) {
                    localStorage.setItem('userProfile', JSON.stringify(user));
                }
            }
            loadProfile();
        });

        function handleSubmit(event) {
            event.preventDefault(); 

            var fName = $('#firstName').val().trim();
            var lName = $('#lastName').val().trim();
            var phone = $('#phoneInput').val().trim();
            var desc = $('#descriptionInput').val().trim();

            var isValid = true;

            $('.form-control').removeClass('is-invalid');

            if (fName.length === 0) {
                $('#firstNameError').text("First Name không được để trống!");
                $('#firstName').addClass('is-invalid');
                isValid = false;
            } else if (fName.length < 3 || fName.length > 30) {
                $('#firstNameError').text("First Name phải từ 3-30 ký tự!");
                $('#firstName').addClass('is-invalid');
                isValid = false;
            }

            if (lName.length === 0) {
                $('#lastNameError').text("Last Name không được để trống!");
                $('#lastName').addClass('is-invalid');
                isValid = false;
            } else if (lName.length < 3 || lName.length > 30) {
                $('#lastNameError').text("Last Name phải từ 3-30 ký tự!");
                $('#lastName').addClass('is-invalid');
                isValid = false;
            }

            if (phone.length === 0) {
                $('#phoneError').text("Số điện thoại không được để trống!");
                $('#phoneInput').addClass('is-invalid');
                isValid = false;
            } else if (phone.length < 9 || phone.length > 13) {
                $('#phoneError').text("Số điện thoại phải từ 9-13 số!");
                $('#phoneInput').addClass('is-invalid');
                isValid = false;
            }

            if (isValid) {
                var userData = {
                    firstName: fName,
                    lastName: lName,
                    email: $('#emailInput').val(),
                    phone: phone,
                    description: desc
                };
                localStorage.setItem('userProfile', JSON.stringify(userData));
                alert("Cập nhật thông tin thành công!");
            }

            return false;
        }

        function handleReset() {
            $('.form-control').removeClass('is-invalid');
            $('.invalid-feedback').text("");
        }

        function handleLogout(event) {
            event.preventDefault(); 

            var confirmLogout = confirm("Are you sure to logout?");

            if (confirmLogout) {
                localStorage.removeItem('userProfile');

                // alert("Logout succe!");
                window.location.href = "Login.html";
            }
        }
    </script>
</body>

</html>
