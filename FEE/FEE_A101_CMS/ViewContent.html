<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>View content</title>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom shadow-sm">
        <a class="navbar-brand" href="#">CMS</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active">
                    <a class="nav-link dropdown-toggle text-primary" href="#" data-toggle="dropdown"
                        aria-expanded="false">
                        <i class="fa fa-user"></i>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right">
                        <a class="dropdown-item border-bottom" href="./EditProfile.html"><i
                                class="fa fa-user mr-2"></i>User Profile</a>
                        <a onclick="handleLogout(event)" class="dropdown-item" href="#"><i
                                class="fa fa-sign-out mr-2"></i>Logout</a>

                    </div>
                </li>



            </ul>
        </div>
    </nav>
    <div class="row no-gutters">
        <div class="col-3 border-right pr-0" style="min-height: 100vh; background-color: #f8f9fa;">
            <div class="input-group mb-3 p-3 border-bottom">
                <input type="text" class="form-control" placeholder="Search">
                <div class="input-group-append">
                    <span class="input-group-text bg-light"><i class="fa fa-search"></i></span>
                </div>
            </div>
            <div class="list-group list-group-flush">
                <a href="#" class="list-group-item list-group-item-action text-primary active-sidebar">
                    <i class="fa fa-th-list mr-2"></i> View contents
                </a>
                <a href="./FormContent.html" class="list-group-item list-group-item-action  text-primary">
                    <i class="fa fa-edit mr-2"></i> Form content
                </a>
            </div>
        </div>

        <div class="flex-grow-1 p-4 mt-3 right-content">

            <div id="loader" class="position-absolute w-100 h-100 d-none justify-content-center align-items-center"
                style="top: 0; left: 0;">
                <div class="text-center">
                    <h4 class="text-secondary">Loading contents...</h4>
                </div>
            </div>

            <h3>View Content</h3>
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table border">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Title</th>
                                <th>Brief</th>
                                <th>Created Date</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

    <script>
        $(document).ready(function () {

            function renderTable() {
                const tbody = $('#table-body');
                tbody.empty();
                const contents = JSON.parse(localStorage.getItem('contents')) || [];

                if (contents.length === 0) {
                    tbody.append('<tr><td colspan="4" class="text-center">No data available.</td></tr>');
                    return;
                }

                contents.forEach((item, index) => {
                    tbody.append(`
                        <tr>
                            <td>${index + 1}</td>
                            <td>${item.title}</td>
                            <td>${item.brief}</td>
                            <td>${item.date || 'N/A'}</td>
                        </tr>
                    `);
                });
            }

            function startLoadingProcess() {
                $('#loader').removeClass('d-none').addClass('d-flex');

                setTimeout(function () {
                    $.ajax({
                        url: window.location.href,
                        type: 'GET',
                        success: function () {
                            renderTable();
                        },
                        complete: function () {
                            $('#loader').addClass('d-none').removeClass('d-flex');
                        }
                    });
                }, 5000);
            }

            startLoadingProcess();

        });

        function handleLogout(event) {
            event.preventDefault(); 

            var confirmLogout = confirm("Are you sure to logout?");

            if (confirmLogout) {
                localStorage.removeItem('userProfile');

                // alert("Logout succe!");
                window.location.href = "Login.html";
            }
        }
    </script>
</body>

</html>
