<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Visitor Infomation</title>
</head>

<body>


    <div class="container mt-4">
        <img src="./banner.jpg" alt="" class="img-fluid mb-4 w-100  banner-top">
        <div class="border bg-black p-2 mb-4">
            <h2 class="text-success">Visitor Information</h2>
        </div>
        <form id="registrationForm" class="d-flex justify-content-center" >
            <div class="border bg-black p-2 w-auto" style="max-width: 700px;">
                <div class="form-group row">
                    <label for="firstName" class="col-sm-3">First name:</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="firstName">
                    </div>
                </div>

                <div class="form-group row">
                    <label for="lastName" class="col-sm-3">Last name:</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="lastName">
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-sm-3 col-form-label">Gender:</label>
                    <div class="col-sm-9">
                        <select class="form-control" id="gender">
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                </div>

                <div class="form-group row">
                    <label for="telephone" class="col-sm-3">Telephone:</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="telephone">
                    </div>
                </div>

                <div class="form-group row">
                    <label for="email" class="col-sm-3">Email:</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="email">
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-sm-3">You are in:</label>
                    <div class="col-sm-9 d-flex flex-wrap">
                        <div class="custom-control custom-radio mr-3">
                            <input type="radio" id="regionEurope" name="region" class="custom-control-input"
                                value="Europe">
                            <label class="custom-control-label" for="regionEurope">Europe</label>
                        </div>
                        <div class="custom-control custom-radio mr-3">
                            <input type="radio" id="regionAfrica" name="region" class="custom-control-input"
                                value="Africa">
                            <label class="custom-control-label" for="regionAfrica">Africa</label>
                        </div>
                        <div class="custom-control custom-radio mr-3">
                            <input type="radio" id="regionAustralia" name="region" class="custom-control-input"
                                value="Australia">
                            <label class="custom-control-label" for="regionAustralia">Australia</label>
                        </div>
                        <div class="custom-control custom-radio mr-3">
                            <input type="radio" id="regionAsia" name="region" class="custom-control-input" value="Asia">
                            <label class="custom-control-label" for="regionAsia">Asia</label>
                        </div>
                        <div class="custom-control custom-radio">
                            <input type="radio" id="regionAmerica" name="region" class="custom-control-input"
                                value="America">
                            <label class="custom-control-label" for="regionAmerica">America</label>
                        </div>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-sm-3 col-form-label">What are your hobbies</label>
                    <div class="col-sm-9">
                        <div class="row">
                            <div class="col-sm-4">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="hobby1" value="Swimming">
                                    <label class="custom-control-label" for="hobby1">Swimming</label>
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="hobby2" value="Cooking">
                                    <label class="custom-control-label" for="hobby2">Cooking</label>
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="hobby3" value="Shopping">
                                    <label class="custom-control-label" for="hobby3">Shopping</label>
                                </div>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-sm-4">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="hobby4" value="Sport">
                                    <label class="custom-control-label" for="hobby4">Sport</label>
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="hobby5" value="Dance">
                                    <label class="custom-control-label" for="hobby5">Dance</label>
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="hobby6" value="Sing">
                                    <label class="custom-control-label" for="hobby6">Sing</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-sm-3 col-form-label">Description</label>
                    <div class="col-sm-9">
                        <textarea class="form-control" id="description" rows="6"></textarea>
                    </div>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-success">Register</button>
                </div>
            </div>
        </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
</body>

</html>
